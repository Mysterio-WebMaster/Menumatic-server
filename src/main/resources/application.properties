spring.application.name=menumatic-server
spring.application.version=0.0.1
server.port=5000

# Database Connection
spring.datasource.url=jdbc:postgresql://localhost:5432/menumatic
spring.datasource.username=postgres
spring.datasource.password=super
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Origin
app.cors.origin=http://localhost:3000

# AI Engine
aiengineurl=http://localhost:8000/engine/v1